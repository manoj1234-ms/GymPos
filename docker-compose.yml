version: '3.8'

services:

  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: gympos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gympos
      POSTGRES_PASSWORD: gympos_secure_pass
      POSTGRES_DB: gympos_db
    volumes:
      - pgdata:/var/lib/postgresql/data   # Persistent data volume
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gympos -d gympos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gympos-backend:latest
    container_name: gympos_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://gympos:gympos_secure_pass@db:5432/gympos_db
      - SECRET_KEY=pro-trainer-ultra-secret-2025
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: gympos-frontend:latest
    container_name: gympos_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

# ─── Volumes ──────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
